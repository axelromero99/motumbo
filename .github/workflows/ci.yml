name: ci

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to the vendored commit: lockstep peers must run identical physics.
      - name: Clone Box3D
        run: |
          git clone https://github.com/erincatto/box3d.git vendor/box3d
          git -C vendor/box3d checkout 1c5ac42c376eb216734df1f35d14bf33c29bb6e7

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.2

      - name: Build simulation (WASM)
        run: |
          emcmake cmake -S . -B build/wasm -DCMAKE_BUILD_TYPE=Release
          cmake --build build/wasm --target sim
          mkdir -p web/src/gen
          cp build/wasm/motumbo.js build/wasm/motumbo.wasm web/src/gen/

      - uses: actions/setup-node@v4
        with:
          # 22 (LTS) so `npm test` can run the TS signal-matchmaking test directly
          # via --experimental-transform-types (unavailable on 20). Vite 8 supports it.
          node-version: 22

      - name: Web dependencies
        run: npm ci
        working-directory: web

      - name: Tests (typecheck + determinism + level & reachability audits + modes)
        run: npm test
        working-directory: web

      - name: Build site
        run: npm run build
        working-directory: web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v4
